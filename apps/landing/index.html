    <div class="lang-wrapper">
      <button class="lang-btn" id="lang-btn" aria-label="Cambiar idioma">
        <span id="lang-flag">🇨🇱</span>
        <span id="lang-label-btn">Español</span>
        <span class="chevron">▼</span>
      </button>
      <div class="lang-dropdown" id="lang-dropdown" role="listbox">
        <div class="lang-option selected" role="option" data-lang="es">🇨🇱 Español</div>
        <div class="lang-option" role="option" data-lang="en">🇬🇧 English</div>
      </div>
    </div>
  </header>

  <!-- CENTER: picture + nombre / frases -->
  <main class="center-content">
    <div class="main-picture">
      <img src="foto-de-perfil.png" alt="Foto de María Constanza Riquelme" />
    </div>
    <div class="text-group">
      <p class="name">María Constanza Riquelme</p>
      <div class="quote-area">
        <div class="quote-inner">
          <p class="quote visible" id="quote-text">El autoconocimiento es la herramienta más afilada que tengo.</p>
          <p class="quote-attr visible" id="quote-attr"></p>
          <div class="dots" id="dots">
            <span class="dot active" data-index="0"></span>
            <span class="dot" data-index="1"></span>
            <span class="dot" data-index="2"></span>
            <span class="dot" data-index="3"></span>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- CARDS -->
  <footer class="links-row">

    <!-- Portafolio -->
    <a class="link-card card-portfolio" href="https://portfolio.mariariquelme.dev">
      <div class="terminal-bg">
        <div class="term-lines" id="term-lines"></div>
      </div>
      <div class="title-shield"></div>
      <div class="link-card-content">
        <span class="link-label" id="label-portfolio">Portafolio</span>
        <span class="link-title" id="title-portfolio">Explora mi trabajo</span>
        <span class="link-arrow">→</span>
      </div>
    </a>

    <!-- Blog -->
    <a class="link-card card-blog" href="https://blog.mariariquelme.dev">
      <div class="doc-bg">
        <div class="doc-lines" id="doc-lines"></div>
      </div>
      <div class="link-card-content">
        <span class="link-label">Blog</span>
        <span class="link-title" id="title-blog">Lee mi perspectiva</span>
        <span class="link-arrow">→</span>
      </div>
    </a>

    <!-- Constanza -->
    <a class="link-card card-constanza" href="https://constanza.mariariquelme.dev">
      <svg class="vine-svg" id="vine-svg" viewBox="0 0 200 116" preserveAspectRatio="none">
        <rect class="vine-border" x="1" y="1" width="198" height="114" rx="11"/>
        <ellipse class="leaf" cx="36"  cy="2"   rx="5" ry="3"   transform="rotate(-30 36 2)"/>
        <ellipse class="leaf" cx="80"  cy="1.5" rx="4" ry="2.5" transform="rotate(15 80 1.5)"/>
        <ellipse class="leaf" cx="140" cy="2"   rx="4" ry="2.5" transform="rotate(-20 140 2)"/>
        <ellipse class="leaf" cx="176" cy="20"  rx="4" ry="2.5" transform="rotate(60 176 20)"/>
        <ellipse class="leaf" cx="197" cy="55"  rx="4" ry="2.5" transform="rotate(80 197 55)"/>
      </svg>
      <div class="link-card-content">
        <span class="link-label">Constanza</span>
        <span class="link-title" id="title-constanza">Offline</span>
        <span class="link-arrow">→</span>
      </div>
    </a>

  </footer>
