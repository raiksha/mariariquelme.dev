<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En construcción — mariariquelme.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow+Condensed:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Fondo de textura/ruido -->

  <main class="container">

    <header class="site-header">
      <a class="domain-badge" href="https://github.com/raiksha">

        <span class="label-small">[ EN CONSTRUCCIÓN ]</span>

        <div class="frame-corner tr"></div>
        <div class="frame-corner bl"></div>
        <div class="frame-corner br"></div>
        <div class="image-inner">

        <div class="frame-label">// cargando developer.gif</div>

      <!-- Texto descriptivo -->
      <div class="desc-block">
        <p class="desc-text-en muted-small">
          Construyendo algo. Vuelve pronto.
        </p>
      </div>

    <footer class="site-footer">
